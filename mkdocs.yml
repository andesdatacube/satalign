docs_dir: .

# Project information
site_name: Satalign
site_url: https://andesdatacube.github.io/satalign/
site_author: IPL-UV Project
site_description: Satalign is a Python library for multi-temporal co-registration of satellite imagery.

# Repository
repo_url: https://github.com/andesdatacube/satalign
repo_name: andesdatacube/satalign
use_directory_urls: false

# Configuration
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: '#201357'
      accent: white
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  logo: https://huggingface.co/datasets/JulioContrerasH/DataMLSTAC/resolve/main/logo_satalign.png
  favicon: https://huggingface.co/datasets/JulioContrerasH/DataMLSTAC/resolve/main/logo_satalign.png
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.top
    - navigation.expand
    - navigation.indexes
    - header.autohide
    - content.code.copy
    - content.code.annotate

# Page tree
nav:
  - Home:
    - README.md
    - Contributing: CONTRIBUTING.md
    - Changelog: CHANGELOG.md
    - Code of conduct: CODE_OF_CONDUCT.md

# Plugins
plugins:
  - search
  - same-dir
  - mkdocstrings
  - awesome-pages

# Markdown extensions
markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.pathconverter
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - mdx_truly_sane_lists
  - toc:
      permalink: true


extra_css:
  - docs/style/style.css